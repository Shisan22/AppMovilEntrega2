  <rect x="48" y="340" width="80" height="24" rx="4" fill="#d6d3d1" />
  <rect x="48" y="370" width="100" height="12" rx="4" fill="#e7e5e4" />

  <rect x="195" y="290" width="155" height="100" rx="16" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" />
  <circle cx="219" cy="314" r="12" fill="#e7e5e4" />
