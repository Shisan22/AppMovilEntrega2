  <rect x="219" y="370" width="100" height="12" rx="4" fill="#e7e5e4" />

  <!-- Menu List -->
  <rect x="24" y="420" width="327" height="168" rx="16" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" />
  
  <!-- Item 1 -->
  <circle cx="48" cy="448" r="12" fill="#e7e5e4" />
  <rect x="76" y="442" width="120" height="12" rx="4" fill="#d6d3d1" />
  <line x1="24" y1="476" x2="351" y2="476" stroke="#e7e5e4" stroke-width="1" />

  <!-- Item 2 -->
  <circle cx="48" cy="504" r="12" fill="#e7e5e4" />
  <rect x="76" y="498" width="140" height="12" rx="4" fill="#d6d3d1" />
