  <rect x="24" y="612" width="327" height="48" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1" />
  <rect x="137.5" y="628" width="100" height="16" rx="4" fill="#ef4444" />

  <!-- Bottom Navigation (5 items) -->
  <rect x="0" y="730" width="375" height="82" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" />
  <!-- Home -->
  <circle cx="37.5" cy="760" r="14" fill="#d6d3d1" />
  <!-- Calendar -->
  <circle cx="112.5" cy="760" r="14" fill="#d6d3d1" />
  <!-- Relax -->
