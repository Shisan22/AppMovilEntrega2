<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <!-- Background -->
  <rect width="375" height="812" fill="#fafaf9" />
  
  <!-- Status Bar Placeholder -->
  <rect x="0" y="0" width="375" height="44" fill="#f5f5f4" />
  
  <!-- Header: Greeting & Date -->
  <rect x="24" y="60" width="160" height="28" rx="4" fill="#d6d3d1" />
  <rect x="24" y="96" width="120" height="16" rx="4" fill="#e7e5e4" />
  
  <!-- Mood Selector Card -->
  <rect x="24" y="140" width="327" height="140" rx="16" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" />
  <rect x="40" y="160" width="180" height="20" rx="4" fill="#d6d3d1" />
  <!-- 5 Mood Buttons -->
  <g fill="#e7e5e4">
    <circle cx="60" cy="220" r="24" />
    <circle cx="123" cy="220" r="24" />
    <circle cx="187" cy="220" r="24" />
    <circle cx="251" cy="220" r="24" />
    <circle cx="315" cy="220" r="24" />
  </g>
  
  <!-- Recent Entries Section -->
  <rect x="24" y="310" width="140" height="20" rx="4" fill="#d6d3d1" />
  
  <!-- Entry Card 1 -->
  <rect x="24" y="346" width="327" height="88" rx="12" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" />
  <circle cx="52" cy="390" r="16" fill="#e7e5e4" />
  <rect x="84" y="366" width="100" height="16" rx="4" fill="#d6d3d1" />
  <rect x="84" y="390" width="200" height="12" rx="4" fill="#e7e5e4" />
  <rect x="84" y="410" width="150" height="12" rx="4" fill="#e7e5e4" />
  <rect x="310" y="366" width="24" height="12" rx="4" fill="#e7e5e4" /> <!-- Time -->

  <!-- Entry Card 2 -->
  <rect x="24" y="446" width="327" height="88" rx="12" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" />
  <circle cx="52" cy="490" r="16" fill="#e7e5e4" />
  <rect x="84" y="466" width="80" height="16" rx="4" fill="#d6d3d1" />
  <rect x="84" y="490" width="180" height="12" rx="4" fill="#e7e5e4" />
  <rect x="84" y="510" width="120" height="12" rx="4" fill="#e7e5e4" />
  <rect x="310" y="466" width="24" height="12" rx="4" fill="#e7e5e4" /> <!-- Time -->

  <!-- Bottom Navigation (5 items) -->
  <rect x="0" y="730" width="375" height="82" fill="#ffffff" stroke="#e7e5e4" stroke-width="1" />
  <!-- Home (Active) -->
  <circle cx="37.5" cy="760" r="14" fill="#292524" />
  <!-- Calendar -->
  <circle cx="112.5" cy="760" r="14" fill="#d6d3d1" />
  <!-- Relax -->
  <circle cx="187.5" cy="760" r="14" fill="#d6d3d1" />
  <!-- Profile -->
  <circle cx="262.5" cy="760" r="14" fill="#d6d3d1" />
  <!-- Emergency -->
  <circle cx="337.5" cy="760" r="14" fill="#d6d3d1" />
